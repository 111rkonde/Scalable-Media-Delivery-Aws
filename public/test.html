<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
        }
        .success {
            color: #4CAF50;
            font-size: 24px;
            margin: 20px 0;
        }
        .test-link {
            color: #fff;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 5px;
            margin: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Mobile Test Page</h1>
        <div class="success">✅ CSS is loading correctly!</div>
        <p>If you can see this styled page, then mobile access is working!</p>
        
        <div>
            <a href="/test.html" class="test-link">Refresh Test</a>
            <a href="/" class="test-link">Go to Gallery</a>
            <a href="/api/debug" class="test-link">Test API</a>
        </div>
        
        <div id="results"></div>
    </div>

    <script>
        // Test JavaScript functionality
        document.addEventListener('DOMContentLoaded', function() {
            const results = document.getElementById('results');
            results.innerHTML = '<div class="success">✅ JavaScript is working!</div>';
            
            // Test API call
            fetch('/api/debug')
                .then(response => response.json())
                .then(data => {
                    results.innerHTML += '<p>✅ API is working! IP: ' + data.ip + '</p>';
                })
                .catch(error => {
                    results.innerHTML += '<p>❌ API Error: ' + error.message + '</p>';
                });
        });
    </script>
</body>
</html>
